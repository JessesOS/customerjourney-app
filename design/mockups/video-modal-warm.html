<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Video modal — current vs warmed</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  body{margin:0;background:#f5ead8;font-family:'Figtree',sans-serif;color:#201e1d;padding:28px;}
  h4{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#a19786;font-weight:600;margin:0 0 10px;}
  .pair{display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:1100px;margin:0 auto;}
  .stage{position:relative;height:340px;border-radius:16px;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:24px;}
  .modal{width:100%;max-width:460px;border-radius:20px;overflow:hidden;}
  .mhead{display:flex;align-items:center;gap:14px;padding:16px 20px;}
  .play{width:30px;height:30px;border-radius:99px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .kick{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;}
  .ttl{font-weight:600;font-size:15px;margin-top:3px;}
  .x{width:32px;height:32px;border-radius:99px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:auto;}
  .vid{display:block;width:100%;aspect-ratio:16/9;background:#000;display:flex;align-items:center;justify-content:center;}
  .vid span{color:rgba(255,255,255,.35);font-size:12px;font-family:'IBM Plex Mono',monospace;letter-spacing:.1em;}
</style>
</head>
<body>
<div class="pair">
  <!-- CURRENT -->
  <div>
    <h4>Current — dark / gold (unchanged today)</h4>
    <div class="stage" style="background:rgba(4,5,8,0.82)">
      <div class="modal" style="background:#0d1016;border:1px solid rgba(255,255,255,0.1);box-shadow:0 40px 120px rgba(0,0,0,0.7);color:#eef1f6">
        <div class="mhead" style="border-bottom:1px solid rgba(255,255,255,0.07)">
          <span class="play" style="background:#f5a623"><svg width="13" height="13" viewBox="0 0 24 24" fill="#1c1300"><path d="M8 5v14l11-7z"/></svg></span>
          <div>
            <div class="kick" style="color:#e5b34a">Walkthrough</div>
            <div class="ttl">Build — full walkthrough</div>
          </div>
          <span class="x" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#eef1f6"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></span>
        </div>
        <div class="vid"><span>VIDEO</span></div>
      </div>
    </div>
  </div>
  <!-- WARMED -->
  <div>
    <h4>Warmed — Organic dialog rules (card surface, warm-ink scrim, terracotta)</h4>
    <div class="stage" style="background:rgba(32,30,29,0.6)">
      <div class="modal" style="background:#f9f4ed;border:1px solid #dcd3c4;box-shadow:0 40px 120px rgba(46,43,37,0.45);color:#201e1d">
        <div class="mhead" style="border-bottom:1px solid #eee7db">
          <span class="play" style="background:#c67139"><svg width="13" height="13" viewBox="0 0 24 24" fill="#fff2eb"><path d="M8 5v14l11-7z"/></svg></span>
          <div>
            <div class="kick" style="color:#c67139">Walkthrough</div>
            <div class="ttl">Build — full walkthrough</div>
          </div>
          <span class="x" style="background:#eee7db;border:1px solid #dcd3c4;color:#201e1d"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></span>
        </div>
        <div class="vid"><span>VIDEO</span></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
