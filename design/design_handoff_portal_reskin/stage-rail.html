<!-- @dsCard group="Organic Reskin" name="StageRail — journey nav" subtitle="Persistent 5-stage rail: done / current (progress) / locked — from StageRail.tsx" viewport="360x560" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Organic Reskin — StageRail</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..900&display=swap" rel="stylesheet" />
<style>
  :root{
    --pj-rail:#eee7db;--pj-ink:#201e1d;--pj-muted:#82796a;--pj-faint:#a19786;
    --pj-line:#dcd3c4;--pj-act:#c67139;--pj-act-fill:#ffe1d0;
    --pj-done:#56633f;--pj-upnext:#a19786;
    --font-body:'Figtree','Segoe UI',system-ui,sans-serif;
  }
  body{margin:0;background:#f5ead8;font-family:var(--font-body);color:var(--pj-ink);}
  /* Exact StageRail.tsx inline styles (rail width 292) */
  .rail{width:292px;background:var(--pj-rail);border-right:1px solid var(--pj-line);padding:24px 18px;}
  .eyebrow{font-size:10px;letter-spacing:.16em;text-transform:uppercase;font-weight:650;color:var(--pj-faint);margin:2px 10px 14px;}
  .stage{display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;cursor:pointer;padding:13px 12px;border-radius:12px;position:relative;border:none;background:transparent;font-family:var(--font-body);}
  .stage.active{background:var(--pj-act-fill);}
  .stage + .stage{margin-top:2px;}
  .bar{position:absolute;left:0;top:11px;bottom:11px;width:3px;border-radius:3px;background:var(--pj-act);}
  .ic{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;margin-top:1px;}
  .name{font-size:14px;letter-spacing:-0.01em;}
  .sub{font-size:12px;margin-top:2px;}
  .prog{margin-top:8px;height:4px;width:150px;border-radius:4px;background:#dcd3c4;overflow:hidden;}
  .prog span{display:block;height:100%;background:var(--pj-act);border-radius:4px;}
  .foot{margin:22px 10px 0;padding-top:18px;border-top:1px solid var(--pj-line);font-size:12px;color:var(--pj-muted);}
</style>
</head>
<body>
<div class="rail">
  <div class="eyebrow">Your journey</div>

  <button class="stage">
    <span class="ic" style="background:var(--pj-done);color:#fff"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4 10-12"/></svg></span>
    <span><span class="name" style="font-weight:650;color:var(--pj-ink)">Welcome &amp; setup</span><span class="sub" style="display:block;color:var(--pj-muted)">All 4 tasks done · Days 1–2</span></span>
  </button>

  <button class="stage active">
    <span class="bar" aria-hidden="true"></span>
    <span class="ic" style="border:2px solid var(--pj-act);color:var(--pj-act);font-weight:700;font-size:10px">2</span>
    <span><span class="name" style="font-weight:650;color:var(--pj-ink)">Connect your accounts</span><span class="sub" style="display:block;color:var(--pj-muted)">2 of 5 tasks done · Days 3–5</span>
      <span class="prog"><span style="width:40%"></span></span>
    </span>
  </button>

  <button class="stage">
    <span class="ic" style="border:1.5px solid #c0b6a5;color:var(--pj-upnext)">3</span>
    <span><span class="name" style="font-weight:500;color:var(--pj-upnext)">Build &amp; launch</span><span class="sub" style="display:block;color:var(--pj-faint)">Days 6–10</span></span>
  </button>

  <button class="stage">
    <span class="ic" style="border:1.5px solid #c0b6a5;color:var(--pj-upnext)">4</span>
    <span><span class="name" style="font-weight:500;color:var(--pj-upnext)">Review &amp; optimise</span><span class="sub" style="display:block;color:var(--pj-faint)">Days 11–20</span></span>
  </button>

  <button class="stage">
    <span class="ic" style="border:1.5px solid #c0b6a5;color:var(--pj-upnext)">5</span>
    <span><span class="name" style="font-weight:500;color:var(--pj-upnext)">Ongoing partnership</span><span class="sub" style="display:block;color:var(--pj-faint)">Days 21–30</span></span>
  </button>

  <div class="foot">Overall: <b style="color:var(--pj-ink)">38%</b> of the journey complete</div>
</div>
</body>
</html>
